# ============================================================
#  微信证据助手 - 配置文件
#  WeChat Evidence Agent - Configuration
#
#  将此文件复制为 config.yaml 并根据实际情况修改。
#  敏感信息（如 API 密钥）建议通过环境变量设置，
#  而非写入此文件。
# ============================================================

# ----------------------------------------------------------
# OpenAI / 大语言模型配置
# ----------------------------------------------------------

# OpenAI API 密钥（必填）
# 也可通过环境变量 OPENAI_API_KEY 设置（推荐）
openai_api_key: ""

# 自定义 API 端点（可选）
# 如使用兼容 OpenAI 接口的第三方服务（如 Azure、本地部署等），
# 请填写对应的 base_url。留空则使用 OpenAI 官方端点。
# openai_base_url: "https://api.openai.com/v1"

# 使用的模型名称
# 推荐使用 gpt-4o，效果最佳；gpt-3.5-turbo 可降低成本
openai_model: "gpt-4o"

# ----------------------------------------------------------
# 路径配置
# ----------------------------------------------------------

# 微信数据目录（可选）
# 留空则自动检测 Windows 默认路径：
#   %USERPROFILE%/Documents/WeChat Files/{wxid}/Msg/
# 如果微信安装在非默认位置，请手动指定。
# wechat_dir: "C:/Users/你的用户名/Documents/WeChat Files/wxid_xxx/Msg"

# 输出目录
# 证据文件、导出文档、媒体文件等的保存位置
output_dir: "./output"

# ----------------------------------------------------------
# 媒体处理配置
# ----------------------------------------------------------

# Whisper 语音识别模型大小
# 可选值: tiny / base / small / medium / large
# tiny:   最快，精度最低，适合快速预览
# base:   平衡速度与精度（推荐）
# small:  较好精度，速度适中
# medium: 高精度，需要较多内存
# large:  最高精度，需要GPU和大量显存
whisper_model: "base"

# ----------------------------------------------------------
# 语言设置
# ----------------------------------------------------------

# 主要语言
# zh: 中文（默认）
# en: 英文
language: "zh"

# ----------------------------------------------------------
# 证据文书模板设置
# 生成法庭证据清单时使用的默认信息
# ----------------------------------------------------------

evidence_template:
  # 受理法院名称
  court_name: ""

  # 案号（如已立案）
  case_number: ""

  # 代理律师姓名
  lawyer_name: ""

  # 律师事务所名称
  law_firm: ""

  # 原告姓名/名称
  plaintiff: ""

  # 被告姓名/名称
  defendant: ""

  # 公证处名称（如需要公证）
  notary_office: ""

# ----------------------------------------------------------
# 高级设置
# ----------------------------------------------------------

# LLM 最大并发请求数
max_concurrent_requests: 5

# 单次 LLM 请求超时时间（秒）
request_timeout: 120

# 日志级别
# 可选值: DEBUG / INFO / WARNING / ERROR
log_level: "INFO"
